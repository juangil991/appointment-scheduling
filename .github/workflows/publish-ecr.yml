name: Publish Docker Image

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed

permissions:
  contents: read

jobs:
  publish:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login \
            --username AWS \
            --password-stdin public.ecr.aws

      - name: Build Docker Image
        run: |
          docker build \
            -t appointment-scheduling:${{ github.event.workflow_run.head_sha }} .

      - name: Tag Docker Image
        run: |
          docker tag \
            appointment-scheduling:${{ github.event.workflow_run.head_sha }} \
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/${{ secrets.ECR_REPOSITORY }}:${{ github.event.workflow_run.head_sha }}

      - name: Tag Latest
        run: |
          docker tag \
            appointment-scheduling:${{ github.event.workflow_run.head_sha }} \
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push SHA
        run: |
          docker push \
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/${{ secrets.ECR_REPOSITORY }}:${{ github.event.workflow_run.head_sha }}

      - name: Push Latest
        run: |
          docker push \
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/${{ secrets.ECR_REPOSITORY }}:latest