apiVersion: apps/v1
kind: Deployment

metadata:
  name: appointment-scheduling
  namespace: appointment
  labels:
    app: appointment-scheduling

spec:
  replicas: 1

  selector:
    matchLabels:
      app: appointment-scheduling

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: appointment-scheduling

    spec:
      containers:
        - name: appointment-scheduling

          # Será reemplazada por GitHub Actions
          image: IMAGE_PLACEHOLDER

          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev

          resources:
            requests:
              cpu: 250m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

